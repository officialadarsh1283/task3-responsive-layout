<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Product Card</title>
  </head>
  <body>
    <main class="products">
      <section class="product-card">
        <figure>
          <img src="saiket_task2.jpg" alt="Premium Wireless Headphones" />
        </figure>

        <div class="product-info">
          <h2>Apple AirPods Pro 3</h2>
          <p class="price">$99.99</p>
          <button>Add to Cart</button>
        </div>
      </section>
      <section class="product-card">
        <img src="saiket_task2(1).jpg" alt="Macbook M5" />
        <div class="product-info">
          <h2>Macbook air M5 pro</h2>
          <p class="price">$999.99</p>
          <button>Add to Cart</button>
        </div>
      </section>
    </main>
  </body>
</html>
